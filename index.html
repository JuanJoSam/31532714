<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" sizes="32x32" href="/reto1/icon/cropped-logonuevo-32x32.png">
    <link rel="icon" sizes="192x192" href="/reto1/icon/cropped-logonuevo-192x192.png">
    <link rel="stylesheet" href="/reto1/css/_theme.css">
    <title>ATI[UCV]Log 2026-1</title>

    <style>
    
        body {
            background-color: var(--grey-200);
            font-family: var(--primary-font), var(--condensed-font), var(--flex-font);
            margin: 0;
        }

        header {
            background-color: var(--main-color);
            padding-bottom: 20px;
        }

        ul {
            list-style-type: none;
            display: flex;
        }

        nav ul {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
        }

        #logo {
            color: white;
            margin: 20px 15px 0px 30px;
            font-size: 45px;
        }

        #profile {
            background-color: var(--accent-color);
            padding: 5px 10px;
            border-radius: 100%;
        }

        #formulario {
            display: flex;
            margin-left: 200px;
            margin-top: 30px;
            border-radius: 25px;
            overflow: hidden;
            border: 2px solid transparent;
            box-sizing: border-box;
            width: fit-content;
        }

        #formulario input {
            height: 100%;
            width: 300px;
            flex: 1;
            border: none;
            padding: 10px 20px;
            background-color: white;
            outline: none;
            font: 16px;
            
        }

        #formulario button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 25px;
            height: 100%;
        }

        li img {    
            overflow: hidden;
        }

        span {
            font-size: 20px;
            font-weight: normal;
        }

        nav ul li:last-child {
            margin-left: auto;
            margin-right: 40px;
            margin-top: 20px;       
        }

        footer {
            background-color: var(--grey-50);
            padding: 40px;
            margin-top: 2px;
            align-items: center;
            justify-content: center;
            color: var(--grey-200);
            display: flex;
            font-weight: bold;
        }
    
        .contenedor {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 10px;
        }

    
        .tarjeta {
            width: 220px;
            height: 280px; 
            position: relative;
            background-color: white;
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1); 
            display: flex; 
            flex-direction: column; 
            margin: 10px 30px; 
        }

    
        .tarjeta img {
            width: 100%; 
            height: 180px;
            object-fit: cover; 
            border-radius: 15px 15px 0 0; 
        }

    
        .superpuesto {
            width: 100%;
            height: 100px;
            background-color: white; 
            position: absolute; 
            bottom: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            border-bottom: 12px solid var(--main-color);
            box-sizing: border-box; 
        }

        .superpuesto p {
            margin: 0;
            padding: 0 15px;
            font-weight: 500;
            color: var(--grey-800);
            font-size: 1.1rem;
        }
      
        .contenedor ul {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            list-style-type: none;
            padding: 0;
            margin: 0 auto;
            max-width: 1000px; 
        }

        .contenedor ul li {
            display: flex;
            justify-content: center;
        }

        div h1 {
            padding-left: 35px;
            color: var(--grey-800);
        }

        .principal {
            background-color : var(--grey-50);
            padding-top: 1px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><h1 id = "logo">ATI<span>[UCV]</span>Log</h1></li>
                <li>
                    <form id = "formulario">
                        <input type="text" id="nombre" name="nombre" placeholder="Nombre...">
                        <button>Buscar</button>
                    </form>
                </li>
                <li id = "profile"><img src="/reto1/icon/userIcon.svg" alt = "icon"></li>
            </ul>
        </nav>
    </header>
    <div class="principal">
        <h1>Semestre 2026-1</h1>

        <div class ="contenedor">
            <ul>
                <li>
                    <div class = "tarjeta">
                        <img src="/31532714.jpg" alt="Juan Belisario" class = "juan">
                        <div class = "superpuesto"><p>Juan Belisario</p></div>
                    </div>
                </li>
                <li>
                    <div class = "tarjeta">
                        <img src="/reto1/Dummies/Dummy1.png" alt="Laura Hernandez" class = "dummie">
                        <div class = "superpuesto"><p>Laura Hernandez</p></div> 
                    </div>
                </li>
                <li>
                    <div class = "tarjeta">
                        <img src="/reto1/Dummies/Dummy2.png" alt="Victor Martinez" class = "dummie">
                        <div class = "superpuesto"><p>Victor Martinez</p></div> 
                    </div>
                </li>
                <li>
                    <div class = "tarjeta">
                        <img src="/reto1/Dummies/Dummy3.png" alt="Steven Angulo" class = "dummie">
                        <div class = "superpuesto"><p>Steven Angulo</p></div> 
                    </div>
                </li>
                <li>
                    <div class = "tarjeta">
                        <img src="/reto1/Dummies/Dummy4.png" alt="Beatriz Lizcano" class = "dummie">
                        <div class = "superpuesto"><p>Beatriz Lizcano</p></div> 
                    </div>
                </li>
                <li>
                    <div class = "tarjeta">
                        <img src="/reto1/Dummies/Dummy5.png" alt="Freddy Carrillo" class = "dummie">
                        <div class = "superpuesto"><p>Freddy Carrillo</p></div> 
                    </div>
                </li>
            </ul>
        </div>
    </div>
    <footer>
        <article>
            Copyright © 2026 Escuela de computación - ATI. Todos los derechos reservados
        </article>
    </footer>
</body>
</html>
